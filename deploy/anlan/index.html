<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PulseBoard - Frontend + Backend Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2307111f'/%3E%3Cpath d='M14 38h10l5-20 8 32 5-12h8' fill='none' stroke='%236ee7f9' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="PulseBoard is a cloud-native SaaS demo where the homepage shows both the frontend experience and the live backend platform surface."
    />
    <style>:root {
  color-scheme: dark;
  --bg: #05070d;
  --bg-soft: #0b1020;
  --card: rgba(13, 20, 38, 0.74);
  --card-strong: rgba(18, 28, 52, 0.92);
  --line: rgba(157, 174, 214, 0.18);
  --line-strong: rgba(157, 174, 214, 0.32);
  --text: #eef4ff;
  --muted: #a7b4d0;
  --dim: #73809d;
  --cyan: #67e8f9;
  --mint: #7dd3a7;
  --violet: #a78bfa;
  --amber: #f7c66b;
  --rose: #fb7185;
  --good: #34d399;
  --warn: #fbbf24;
  --bad: #fb7185;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
  --radius-xl: 34px;
  --radius-lg: 24px;
  --radius-md: 16px;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  scroll-behavior: smooth;
  background: var(--bg);
}

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(circle at 12% 12%, rgba(103, 232, 249, 0.2), transparent 28rem),
    radial-gradient(circle at 88% 8%, rgba(167, 139, 250, 0.2), transparent 28rem),
    radial-gradient(circle at 50% 88%, rgba(125, 211, 167, 0.12), transparent 30rem),
    linear-gradient(135deg, #05070d 0%, #08101e 48%, #070912 100%);
  color: var(--text);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
}

body::before {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  content: "";
  opacity: 0.34;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(to bottom, #000, transparent 78%);
}

body::after {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  content: "";
  opacity: 0.18;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='240' height='240' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");
}

button,
a {
  color: inherit;
}

button {
  font: inherit;
}

.app-shell {
  width: min(1220px, calc(100% - 36px));
  margin: 0 auto;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 86px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  min-width: max-content;
}

.brand-mark {
  position: relative;
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  overflow: hidden;
  border: 1px solid rgba(103, 232, 249, 0.4);
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(103, 232, 249, 0.24), rgba(167, 139, 250, 0.2));
  box-shadow: 0 0 34px rgba(103, 232, 249, 0.22);
  font-weight: 900;
}

.brand-mark::after {
  position: absolute;
  inset: -40%;
  content: "";
  background: conic-gradient(from 0deg, transparent, rgba(103, 232, 249, 0.4), transparent 36%);
  animation: spin 8s linear infinite;
}

.brand-mark span {
  position: relative;
  z-index: 1;
}

.brand-copy strong {
  display: block;
  font-size: 16px;
  letter-spacing: 0.01em;
}

.brand-copy small {
  display: block;
  color: var(--muted);
  font-size: 12px;
}

.nav-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}

.lang-select,
.nav-link,
.ghost-button,
.primary-button,
.frontend-home-button {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(10, 16, 30, 0.72);
  color: var(--text);
  text-decoration: none;
  backdrop-filter: blur(18px);
}

.lang-select {
  max-width: 150px;
  padding: 0 12px;
  cursor: pointer;
}

.nav-link,
.ghost-button,
.primary-button,
.frontend-home-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 15px;
  font-size: 14px;
  font-weight: 720;
}

.primary-button {
  border-color: rgba(103, 232, 249, 0.62);
  background: linear-gradient(135deg, rgba(103, 232, 249, 0.9), rgba(167, 139, 250, 0.86));
  color: #06101d;
  box-shadow: 0 14px 48px rgba(103, 232, 249, 0.18);
}

.frontend-home-button {
  min-height: 58px;
  padding: 0 28px;
  border-color: rgba(52, 211, 153, 0.7);
  background:
    radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.9), transparent 18%),
    linear-gradient(135deg, rgba(52, 211, 153, 0.95), rgba(103, 232, 249, 0.9) 52%, rgba(167, 139, 250, 0.92));
  color: #04111b;
  font-size: clamp(15px, 2vw, 18px);
  box-shadow: 0 18px 60px rgba(52, 211, 153, 0.22), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
  transform: translateY(0);
  transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
}

.frontend-home-button:hover {
  box-shadow: 0 24px 76px rgba(103, 232, 249, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.18) inset;
  filter: saturate(1.08);
  transform: translateY(-2px);
}

.frontend-home-button span {
  font-size: 20px;
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(390px, 0.86fr);
  gap: 34px;
  align-items: center;
  padding: 34px 0 54px;
}

.kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  color: var(--cyan);
  font-size: 13px;
  font-weight: 820;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.kicker::before {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--good);
  box-shadow: 0 0 0 7px rgba(52, 211, 153, 0.12), 0 0 26px rgba(52, 211, 153, 0.56);
  content: "";
}

h1 {
  max-width: 860px;
  margin: 0;
  font-size: clamp(44px, 7vw, 86px);
  line-height: 0.92;
  letter-spacing: -0.065em;
}

.gradient-text {
  background: linear-gradient(120deg, #ffffff, #b6f7ff 40%, #d8c9ff 72%, #fff0c2);
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.lead {
  max-width: 720px;
  margin: 24px 0 0;
  color: var(--muted);
  font-size: clamp(17px, 2vw, 21px);
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 30px;
}

.metrics-strip {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 28px;
}

.metric-pill {
  min-height: 88px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  background: rgba(9, 15, 28, 0.62);
  backdrop-filter: blur(16px);
}

.metric-pill strong {
  display: block;
  font-size: 25px;
  line-height: 1;
}

.metric-pill span {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
}

.command-card {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-xl);
  background: linear-gradient(180deg, rgba(16, 24, 46, 0.92), rgba(8, 13, 26, 0.86));
  box-shadow: var(--shadow);
}

.command-card::before {
  position: absolute;
  inset: -1px;
  pointer-events: none;
  content: "";
  background: linear-gradient(135deg, rgba(103, 232, 249, 0.22), transparent 38%, rgba(167, 139, 250, 0.18));
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  padding: 1px;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
}

.window-dots {
  display: inline-flex;
  gap: 7px;
}

.window-dots i {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: var(--rose);
}

.window-dots i:nth-child(2) {
  background: var(--amber);
}

.window-dots i:nth-child(3) {
  background: var(--good);
}

.card-head code {
  color: var(--muted);
  font-size: 12px;
}

.terminal {
  min-height: 360px;
  padding: 20px;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  font-size: 13px;
}

.terminal-line {
  display: grid;
  grid-template-columns: 20px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid rgba(157, 174, 214, 0.08);
  color: #dce8ff;
}

.terminal-line:last-child {
  border-bottom: 0;
}

.prompt {
  color: var(--cyan);
}

.latency {
  color: var(--dim);
}

.dual-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin: 10px 0 18px;
}

.panel {
  position: relative;
  overflow: hidden;
  min-height: 420px;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--card);
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
}

.panel::after {
  position: absolute;
  inset: auto 18px 18px auto;
  width: 160px;
  height: 160px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(103, 232, 249, 0.14), transparent 68%);
  content: "";
  filter: blur(2px);
}

.panel-header {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 22px;
}

.panel-label {
  color: var(--cyan);
  font-size: 12px;
  font-weight: 860;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.panel h2 {
  margin: 6px 0 0;
  font-size: clamp(26px, 4vw, 42px);
  line-height: 1;
  letter-spacing: -0.04em;
}

.panel-copy {
  max-width: 62ch;
  margin: 0;
  color: var(--muted);
}

.status-badge {
  display: inline-flex;
  align-items: center;
  align-self: flex-start;
  gap: 8px;
  min-width: max-content;
  padding: 8px 11px;
  border: 1px solid rgba(52, 211, 153, 0.28);
  border-radius: 999px;
  background: rgba(52, 211, 153, 0.1);
  color: #b7f8d8;
  font-size: 12px;
  font-weight: 800;
}

.status-badge::before {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: currentColor;
  content: "";
  animation: pulse 1.8s ease-in-out infinite;
}


.frontend-home-panel {
  scroll-margin-top: 112px;
}

.frontend-home-panel:focus {
  outline: 2px solid rgba(103, 232, 249, 0.62);
  outline-offset: 6px;
}


.vertical-tower-preview {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(220px, 0.82fr) minmax(160px, 0.5fr);
  gap: 18px;
  align-items: center;
  margin-top: 22px;
  padding: 18px;
  overflow: hidden;
  border: 1px solid rgba(103, 232, 249, 0.22);
  border-radius: 24px;
  background: radial-gradient(circle at 50% 14%, rgba(103, 232, 249, 0.18), transparent 38%), rgba(255, 255, 255, 0.04);
}

.preview-skyline {
  position: relative;
  min-height: 330px;
  perspective: 900px;
  transform-style: preserve-3d;
}

.preview-skyline::before {
  position: absolute;
  left: 50%;
  bottom: 34px;
  width: 150px;
  height: 278px;
  border: 1px solid rgba(103, 232, 249, 0.18);
  border-radius: 30px 30px 12px 12px;
  background: linear-gradient(90deg, rgba(103, 232, 249, 0.08), rgba(255, 255, 255, 0.05), rgba(167, 139, 250, 0.11));
  box-shadow: 0 0 80px rgba(103, 232, 249, 0.16);
  content: "";
  transform: translateX(-50%) rotateX(-5deg) rotateY(-24deg) translateZ(-24px);
}

.preview-spire {
  position: absolute;
  left: 50%;
  top: 10px;
  width: 8px;
  height: 64px;
  border-radius: 999px;
  background: linear-gradient(to bottom, #fff, var(--cyan));
  box-shadow: 0 0 28px rgba(103, 232, 249, 0.58);
  transform: translateX(-50%) translateZ(48px);
}

.preview-floor {
  position: absolute;
  left: 50%;
  bottom: calc(76px + var(--i) * 29px);
  display: grid;
  place-items: center;
  width: calc(190px - var(--i) * 6px);
  height: 24px;
  border: 1px solid rgba(103, 232, 249, 0.34);
  border-radius: 8px;
  background: linear-gradient(90deg, rgba(103, 232, 249, 0.22), rgba(255, 255, 255, 0.07), rgba(167, 139, 250, 0.16));
  color: #dffaff;
  font-size: 10px;
  font-weight: 820;
  letter-spacing: 0.02em;
  transform: translateX(-50%) rotateX(-5deg) rotateY(-24deg) translateZ(calc(34px + var(--i) * 5px));
}

.preview-base {
  position: absolute;
  left: 50%;
  bottom: 22px;
  width: min(270px, 92%);
  padding: 10px 12px;
  border: 1px solid rgba(52, 211, 153, 0.28);
  border-radius: 999px;
  background: rgba(6, 16, 28, 0.78);
  color: #c7f8e2;
  text-align: center;
  font-size: 12px;
  font-weight: 850;
  transform: translateX(-50%);
}

.tower-preview-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 52px;
  padding: 0 18px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--green), var(--cyan), var(--violet));
  color: #06111f;
  font-weight: 900;
  text-decoration: none;
  box-shadow: 0 18px 58px rgba(103, 232, 249, 0.22);
}

.feature-stack,
.backend-stack {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 12px;
}

.feature-card,
.endpoint-row {
  border: 1px solid rgba(157, 174, 214, 0.14);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.045);
}

.feature-card {
  display: grid;
  grid-template-columns: 42px 1fr;
  gap: 12px;
  padding: 14px;
}

.feature-icon {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: rgba(103, 232, 249, 0.1);
  color: var(--cyan);
  font-size: 18px;
}

.feature-card strong,
.endpoint-row strong {
  display: block;
}

.feature-card span,
.endpoint-row span {
  color: var(--muted);
  font-size: 13px;
}

.endpoint-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 14px;
}

.endpoint-path {
  color: #dbeafe;
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 13px;
}

.endpoint-status {
  min-width: 84px;
  padding: 7px 10px;
  border-radius: 999px;
  background: rgba(115, 128, 157, 0.14);
  color: var(--muted);
  text-align: center;
  font-size: 12px;
  font-weight: 820;
}

.endpoint-status.good {
  background: rgba(52, 211, 153, 0.12);
  color: #a7f3d0;
}

.endpoint-status.bad {
  background: rgba(251, 113, 133, 0.12);
  color: #fecdd3;
}

.endpoint-status.warn {
  background: rgba(251, 191, 36, 0.12);
  color: #fde68a;
}

.integration-band {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 18px;
  margin: 18px 0 64px;
}

.signal-map,
.timeline {
  min-height: 320px;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: rgba(9, 15, 28, 0.68);
  backdrop-filter: blur(20px);
}

.signal-orbit {
  position: relative;
  min-height: 210px;
  margin-top: 22px;
}

.node {
  position: absolute;
  display: grid;
  place-items: center;
  width: 82px;
  height: 82px;
  border: 1px solid rgba(103, 232, 249, 0.42);
  border-radius: 26px;
  background: rgba(103, 232, 249, 0.09);
  color: #e0fbff;
  font-size: 12px;
  font-weight: 850;
  text-align: center;
  box-shadow: 0 0 44px rgba(103, 232, 249, 0.14);
}

.node.api {
  left: calc(50% - 41px);
  top: 62px;
  border-color: rgba(167, 139, 250, 0.5);
  background: rgba(167, 139, 250, 0.11);
}

.node.frontend {
  left: 4%;
  top: 26px;
}

.node.worker {
  right: 4%;
  top: 26px;
}

.node.db {
  left: 18%;
  bottom: 0;
}

.node.redis {
  right: 18%;
  bottom: 0;
}

.signal-line {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(76%, 460px);
  height: 1px;
  transform-origin: left center;
  background: linear-gradient(90deg, transparent, rgba(103, 232, 249, 0.7), transparent);
  animation: shimmer 3.8s ease-in-out infinite;
}

.signal-line.one {
  transform: rotate(18deg) translateX(-50%);
}

.signal-line.two {
  transform: rotate(-18deg) translateX(-50%);
  animation-delay: -1.3s;
}

.signal-line.three {
  transform: rotate(90deg) translateX(-50%);
  animation-delay: -2.4s;
}

.timeline-list {
  display: grid;
  gap: 13px;
  margin-top: 18px;
}

.timeline-item {
  display: grid;
  grid-template-columns: 72px 1fr;
  gap: 12px;
  align-items: start;
  padding: 14px;
  border: 1px solid rgba(157, 174, 214, 0.14);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.04);
}

.timeline-item time {
  color: var(--cyan);
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 12px;
}

.timeline-item strong {
  display: block;
}

.timeline-item span {
  display: block;
  margin-top: 3px;
  color: var(--muted);
  font-size: 13px;
}

.footer {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  padding: 28px 0 46px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 13px;
}

.footer a {
  color: #d8e8ff;
  text-decoration: none;
}

[dir="rtl"] .brand,
[dir="rtl"] .feature-card,
[dir="rtl"] .endpoint-row,
[dir="rtl"] .timeline-item {
  direction: rtl;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

@keyframes pulse {
  50% {
    opacity: 0.45;
    transform: scale(1.3);
  }
}

@keyframes shimmer {
  50% {
    opacity: 0.28;
    filter: blur(1px);
  }
}

@media (max-width: 980px) {
  .topbar,
  .nav-actions,
  .footer {
    align-items: flex-start;
    flex-direction: column;
  }

  .hero,
  .dual-grid,
  .integration-band,
  .vertical-tower-preview {
    grid-template-columns: 1fr;
  }

  .hero {
    padding-top: 18px;
  }
}

@media (max-width: 620px) {
  .app-shell {
    width: min(100% - 24px, 1220px);
  }

  .metrics-strip,
  .vertical-tower-preview {
    grid-template-columns: 1fr;
  }

  .panel-header,
  .endpoint-row {
    grid-template-columns: 1fr;
  }

  .panel-header {
    flex-direction: column;
  }

  .terminal-line {
    grid-template-columns: 1fr;
  }

  .node {
    position: relative;
    inset: auto !important;
    width: auto;
    height: 58px;
  }

  .signal-orbit {
    display: grid;
    gap: 10px;
  }

  .signal-line {
    display: none;
  }
}</style>
  </head>

    <div id="app"></div>
    <script type="module">const localeOrder = ['en', 'zh-TW', 'ja', 'ko', 'es', 'fr', 'de', 'pt-BR', 'ar', 'zh-CN'];
const en = {
    languageName: 'English',
    navDocs: 'API Docs',
    navOpenApi: 'OpenAPI',
    navHealth: 'Live health',
    eyebrow: 'Cloud-native SaaS control room',

function getCopy(locale) {
    return { ...en, ...overrides[locale] };
}

const endpointConfig = {

let currentLocale = readLocale();

function readLocale() {
    const requested = new URLSearchParams(window.location.search).get('lang');
    if (requested && localeOrder.includes(requested))
        return requested;
    const stored = window.localStorage.getItem('pulseboard-locale');
    if (stored && localeOrder.includes(stored))
        return stored;
    return 'en';
}
function copy() {
    return getCopy(currentLocale);

function escapeHtml(value) {
    return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}
function stateLabel(state) {
    return copy()[state];
}
function stateClass(state) {
    if (state === 'online' || state === 'docs')
        return 'good';
    if (state === 'checking')
        return 'warn';
    return 'bad';
}
function renderLanguageOptions() {
    return localeOrder
        .map((locale) => `<option value="${locale}" ${locale === currentLocale ? 'selected' : ''}>${getCopy(locale).languageName}</option>`)
        .join('');
}
function endpointRow(key) {
    const config = endpointConfig[key];

        <strong>${escapeHtml(copy()[config.labelKey])}</strong>

      </span>
      <span class="endpoint-status ${stateClass(state)}">${escapeHtml(stateLabel(state))}</span>

}
function renderTerminal() {
    const rows = [
        { command: 'GET /health/live', value: endpointStates.live, latency: latencyMs ? `${latencyMs}ms` : '--' },
        { command: 'GET /health/ready', value: endpointStates.ready, latency: lastProbeAt },
        { command: 'GET /openapi.json', value: endpointStates.openapi, latency: openApiPathCount ? `${openApiPathCount} paths` : '--' },
        { command: 'GET /docs', value: 'docs', latency: 'Scalar' },
        { command: 'UI locale order', value: 'online', latency: `${localeOrder[0]} → ${localeOrder.at(-1)}` },
    ];
    return rows
        .map((row) => `
        <div class="terminal-line">
          <span class="prompt">›</span>
          <span>${escapeHtml(row.command)} <strong class="endpoint-status ${stateClass(row.value)}">${escapeHtml(stateLabel(row.value))}</strong></span>
          <span class="latency">${escapeHtml(row.latency)}</span>
        </div>`)
        .join('');
}

async function fetchWithTimeout(path, timeoutMs = 3500) {
    const started = performance.now();
    const controller = new AbortController();
    const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
    try {
        const response = await fetch(path, { cache: 'no-store', signal: controller.signal });
        return { response, latency: Math.round(performance.now() - started) };
    }
    finally {
        window.clearTimeout(timeout);
    }
}
async function probeBackend() {
    endpointStates = { ...endpointStates, live: 'checking', ready: 'checking', openapi: 'checking' };
    render();
    try {
        const live = await fetchWithTimeout('/health/live');
        endpointStates.live = live.response.ok ? 'online' : 'offline';
        latencyMs = live.latency;
    }
    catch {
        endpointStates.live = 'offline';
        latencyMs = 0;
    }
    try {
        const ready = await fetchWithTimeout('/health/ready');
        endpointStates.ready = ready.response.ok ? 'online' : 'offline';
    }
    catch {
        endpointStates.ready = 'offline';
    }
    try {
        const openapi = await fetchWithTimeout('/openapi.json');
        endpointStates.openapi = openapi.response.ok ? 'online' : 'offline';
        if (openapi.response.ok) {
            const document = (await openapi.response.json());
            openApiPathCount = Object.keys(document.paths ?? {}).length;
        }
    }
    catch {
        endpointStates.openapi = 'offline';
    }
    endpointStates.docs = 'docs';
    lastProbeAt = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    render();
}
