server {
    listen 80;
    listen [::]:80;
    server_name anlan.store www.anlan.store;
    return 301 https://anlan.store$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anlan.store www.anlan.store;

    ssl_certificate /etc/letsencrypt/live/anlan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anlan.store/privkey.pem;

    if ($host = www.anlan.store) {
        return 301 https://anlan.store$request_uri;
    }

    root /var/www/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /health/live {
        proxy_pass http://127.0.0.1:4000/health/live;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /health/ready {
        proxy_pass http://127.0.0.1:4000/health/ready;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:4000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /docs {
        proxy_pass http://127.0.0.1:4000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /docs/ {
        proxy_pass http://127.0.0.1:4000/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:4000/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /saa {
        return 301 /saa/;
    }

    location /saa/ {
        alias /var/www/saa/;
        index index.html;
        try_files $uri $uri/ /saa/index.html;
    }

    location = /sap {
        return 301 /sap/;
    }

    location /sap/ {
        alias /var/www/sap/;
        index index.html;
        try_files $uri $uri/ /sap/index.html;
    }

    location = /ispm {
        return 301 /ispm/;
    }

    location /ispm/ {
        alias /var/www/ispm/;
        index index.html;
        try_files $uri $uri/ /ispm/index.html;
    }
}
