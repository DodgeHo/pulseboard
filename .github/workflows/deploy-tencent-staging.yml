name: Deploy Tencent Staging

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref, branch, tag, or SHA to deploy
        required: true
        default: master

concurrency:
  group: tencent-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: tencent-staging
    permissions:
      contents: read
    steps:
      - name: Validate deploy ref
        env:
          DEPLOY_REF: ${{ inputs.deploy_ref }}
        run: |
          set -euo pipefail
          if [ "${#DEPLOY_REF}" -gt 128 ]; then
            echo "deploy_ref must be 128 characters or fewer." >&2
            exit 1
          fi
          case "$DEPLOY_REF" in
            ""|-*|*[^A-Za-z0-9._/@-]*|*..*|*@{*)
              echo "deploy_ref has an unsafe Git ref shape." >&2
              exit 1
              ;;
          esac
          if ! git check-ref-format --allow-onelevel "$DEPLOY_REF"; then
            echo "deploy_ref has an unsafe Git ref shape." >&2
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.deploy_ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Build and verify public homepage artifact
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm build:web
          pnpm verify:web
          git diff --exit-code -- deploy/anlan/index.html

      - name: Configure SSH
        env:
          STAGING_HOST: ${{ secrets.TENCENT_STAGING_HOST }}
          STAGING_USER: ${{ secrets.TENCENT_STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.TENCENT_STAGING_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.TENCENT_STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_SSH_KEY"
          test -n "$STAGING_KNOWN_HOSTS"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/pulseboard_staging
          chmod 600 ~/.ssh/pulseboard_staging
          printf '%s\n' "$STAGING_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host pulseboard-staging
            HostName $STAGING_HOST
            User $STAGING_USER
            IdentityFile ~/.ssh/pulseboard_staging
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Upload public site assets
        run: |
          set -euo pipefail
          scp deploy/anlan/index.html pulseboard-staging:/tmp/pulseboard-anlan-index.html
          scp deploy/anlan/nginx/anlan.conf pulseboard-staging:/tmp/pulseboard-anlan.conf

      - name: Deploy and verify backend on staging host
        env:
          DEPLOY_REF: ${{ inputs.deploy_ref }}
        run: |
          set -euo pipefail
          ssh pulseboard-staging bash -se -- "$DEPLOY_REF" <<'REMOTE'
          set -euo pipefail
          DEPLOY_REF="$1"
          cd ~/pulseboard

          if [ -n "$(git status --porcelain)" ]; then
            echo "Refusing to deploy over a dirty staging worktree." >&2
            git status --short >&2
            exit 1
          fi

          git fetch origin "$DEPLOY_REF"
          git checkout -B master FETCH_HEAD

          sudo env DOCKER_BUILDKIT=0 COMPOSE_DOCKER_CLI_BUILD=0 docker compose -f docker-compose.production.example.yml up --build -d

          wait_for_url() {
            url="$1"
            for attempt in $(seq 1 30); do
              if curl -fsS "$url"; then
                printf '\n'
                return 0
              fi
              sleep 2
            done

            echo "Timed out waiting for $url" >&2
            sudo docker compose -f docker-compose.production.example.yml ps >&2
            sudo docker compose -f docker-compose.production.example.yml logs --tail=80 api >&2
            return 1
          }

          wait_for_url http://127.0.0.1:4000/health/live
          wait_for_url http://127.0.0.1:4000/health/ready

          set -a
          . ./.env
          set +a
          sudo docker compose -f docker-compose.production.example.yml exec -T \
            -e PULSEBOARD_API_URL=http://127.0.0.1:4000 \
            -e DEMO_API_KEY="$DEMO_API_KEY" \
            api pnpm demo:flow

          ts=$(date -u +%Y%m%dT%H%M%SZ)
          if [ -f /var/www/html/index.html ]; then
            sudo cp /var/www/html/index.html /var/www/html/index.html.backup-$ts
          fi
          if [ -f /etc/nginx/sites-available/anlan.conf ]; then
            sudo cp /etc/nginx/sites-available/anlan.conf /etc/nginx/sites-available/anlan.conf.backup-$ts
          fi

          sudo install -m 0644 /tmp/pulseboard-anlan-index.html /var/www/html/index.html
          sudo install -m 0644 /tmp/pulseboard-anlan.conf /etc/nginx/sites-available/anlan.conf
          sudo nginx -t
          sudo systemctl reload nginx
          REMOTE

      - name: Verify public homepage and backend surface
        env:
          PUBLIC_BASE_URL: ${{ vars.TENCENT_STAGING_PUBLIC_BASE_URL || 'https://anlan.store' }}
        run: pnpm verify:public
