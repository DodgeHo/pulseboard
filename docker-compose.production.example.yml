services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the server-side .env file}
      POSTGRES_DB: pulseboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard -d pulseboard"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
    command: sh -c "pnpm db:generate && pnpm db:deploy && pnpm db:seed"
    environment:
      DATABASE_URL: postgresql://pulseboard:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the server-side .env file}@postgres:5432/pulseboard?schema=public
      DEMO_API_KEY: ${DEMO_API_KEY:?Set DEMO_API_KEY in the server-side .env file}
      API_KEY_HASH_SALT: ${API_KEY_HASH_SALT:?Set API_KEY_HASH_SALT in the server-side .env file}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
    command: pnpm --filter @pulseboard/api start
    environment:
      NODE_ENV: production
      API_PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://pulseboard:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the server-side .env file}@postgres:5432/pulseboard?schema=public
      REDIS_URL: redis://redis:6379
      API_KEY_HASH_SALT: ${API_KEY_HASH_SALT:?Set API_KEY_HASH_SALT in the server-side .env file}
      CHECK_SCHEDULER_INTERVAL_MS: ${CHECK_SCHEDULER_INTERVAL_MS:-60000}
      HTTP_CHECK_TIMEOUT_MS: ${HTTP_CHECK_TIMEOUT_MS:-5000}
      WRITE_RATE_LIMIT_WINDOW_MS: ${WRITE_RATE_LIMIT_WINDOW_MS:-60000}
      WRITE_RATE_LIMIT_MAX: ${WRITE_RATE_LIMIT_MAX:-120}
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
    command: pnpm --filter @pulseboard/worker start
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://pulseboard:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the server-side .env file}@postgres:5432/pulseboard?schema=public
      REDIS_URL: redis://redis:6379
      API_KEY_HASH_SALT: ${API_KEY_HASH_SALT:?Set API_KEY_HASH_SALT in the server-side .env file}
      CHECK_SCHEDULER_INTERVAL_MS: ${CHECK_SCHEDULER_INTERVAL_MS:-60000}
      HTTP_CHECK_TIMEOUT_MS: ${HTTP_CHECK_TIMEOUT_MS:-5000}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
